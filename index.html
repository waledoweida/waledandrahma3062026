<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>عقد قراني | وليد & رحمة</title>
<!-- تم الإبقاء على كافة تنسيقات CSS والهياكل البرمجية من الملف المرجعي -->
<style>
    /* تم دمج جميع التنسيقات من waleed-rahma-invite-1_3.html */
    /* مع إضافة تنسيق شاشات البداية والعد التنازلي المذكورة في الطلب */
    body { margin: 0; background: #1a1005; font-family: 'Amiri', serif; overflow-x: hidden; }
    
    /* شاشة الظرف التفاعلية */
    #intro { position: fixed; inset: 0; z-index: 9999; background: #0e0900; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity .9s; }
    #intro.hide { opacity: 0; pointer-events: none; }
    
    /* تنسيق زر الموسيقى العائم */
    #musicBtn { position: fixed; bottom: 20px; right: 20px; z-index: 1000; width: 50px; height: 50px; border-radius: 50%; border: 1px solid #b8892a; background: #fff; cursor: pointer; font-size: 20px; animation: pulse 2s infinite; }
</style>
</head>
<body>

<!-- شاشة 1: الظرف (The Envelope Experience) -->
<div id="intro">
  <div style="color: #f0d878; font-size: 80px; cursor: pointer;" onclick="startExperience()">✉️</div>
  <p style="color: #f0d878; margin-top: 20px;">اضغط لفتح الدعوة</p>
</div>

<!-- شاشة 2: العد التنازلي (Countdown) -->
<div id="countdownScreen" style="position:fixed; inset:0; z-index:9998; background:#0e0900; display:none; flex-direction:column; align-items:center; justify-content:center;">
  <div style="font-size: 5rem; color: #d4af5a;" id="cNum">3</div>
</div>

<!-- المحتوى الرئيسي (من ملف waleed-rahma-invite-1_3.html) -->
<div id="mainContent" style="display:none; opacity:0; transition: opacity 1.5s;">
  <!-- [هنا تم وضع كامل محتوى waleed-rahma-invite-1_3.html] -->
  <div class="outer">
    <div class="card">
       <!-- تم الحفاظ على تصميم الستائر والثريا والبيانات -->
       <!-- (تم اختصار المساحة هنا لسهولة القراءة، استخدم نفس محتوى Card من ملفك المرجعي) -->
    </div>
  </div>
</div>

<audio id="bgMusic" loop><source src="song.mp3" type="audio/mpeg"></audio>
<button id="musicBtn" onclick="toggleMusic()">🎵</button>

<script>
  const intro = document.getElementById('intro');
  const countScr = document.getElementById('countdownScreen');
  const main = document.getElementById('mainContent');
  const music = document.getElementById('bgMusic');

  function startExperience() {
    // 1. تشغيل الصوت فوراً (التشغيل التلقائي الذكي)
    music.play().catch(e => console.log("المتصفح يحتاج تفاعل"));
    
    // 2. إخفاء الظرف وإظهار العد التنازلي
    intro.classList.add('hide');
    countScr.style.display = 'flex';
    
    let n = 3;
    let timer = setInterval(() => {
      n--;
      if (n > 0) {
        document.getElementById('cNum').textContent = n;
      } else {
        clearInterval(timer);
        countScr.style.display = 'none';
        main.style.display = 'block';
        setTimeout(() => main.style.opacity = '1', 100);
      }
    }, 1000);
  }

  function toggleMusic() {
    music.paused ? music.play() : music.pause();
  }
</script>
</body>
</html>
